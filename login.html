<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login dengan Google Sheets + Debug</title>
  <!-- Library bcrypt.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
</head>
<body>
  <h2>Login</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required><br><br>
    <input type="password" id="password" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
  </form>
  <p id="result"></p>

  <script>
    const sheetId = "1vhPPwpeFsQwSWBhJXIzVmEwI_3ZxdwCIrwWBmDzPbfY";
    const apiKey = "AIzaSyB5-DJ8TNb1DoxfC6LNoecM7YMo8g1yS1I";
    const range = "users!A:B"; // username & hash

    async function getUsers() {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${range}?key=${apiKey}`;
      const res = await fetch(url);
      const data = await res.json();
      return data.values;
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const u = document.getElementById("username").value;
      const p = document.getElementById("password").value;

      const users = await getUsers();
      const user = users.find(row => row[0] === u);

      if (!user) {
        document.getElementById("result").innerText = "User tidak ditemukan!";
        return;
      }

      const hash = user[1];
      const valid = await bcrypt.compare(p, hash);

      if (valid) {
        document.getElementById("result").innerText = "Login berhasil!";
        // Contoh aksi tambahan:
        // Redirect ke halaman dashboard
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("result").innerText = "Password salah!";
      }
    });
  </script>
</body>
</html>
  </script>
</body>
</html>
