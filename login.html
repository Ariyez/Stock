<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
    body {
      font-family: 'Vivo Sans Std', sans-serif;
      margin: 50px;
      text-align: center;
    }
    form {
      max-width: 300px;
      margin: auto;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 5px 0 20px 0;
      display: inline-block;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background-color: #ffc000;
      color: #000;
      padding: 10px;
      width: 100%;
      border: none;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.8;
    }
    #result {
      text-align: center;
      color: red;
    }
    </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p id="message"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
  </script>
</body>
</html>
